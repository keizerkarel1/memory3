; PlatformIO Project Configuration File
;
; Memory Game — Vonk Gespreksstarters (Museum Installation)
; Target: ESP32-S3-WROOM-1 N16R8 on ESP32-S3-DevKitC-1 v1.0
;
; Notes:
;   * The N16R8 module has 8 MB OCTAL PSRAM — GPIO 33-37 are NOT usable.
;   * Native USB-CDC is used for Serial (the board enumerates as /dev/ttyACM*).
;   * Flash size is 16 MB.

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; Use the chip's native USB-CDC for Serial (matches /dev/ttyACM0 enumeration).
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; Make sure the correct flash/PSRAM are configured for the N16R8 module.
board_build.flash_mode = qio
board_build.flash_size = 16MB
board_build.partitions = default_16MB.csv
board_upload.flash_size = 16MB

lib_deps =
    adafruit/Adafruit NeoPixel @ ^1.12.3
    thomasfredericks/Bounce2 @ ^2.72